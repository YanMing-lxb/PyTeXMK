# =============================================================================
# PyTeXMK CI Workflow
# =============================================================================
# 触发条件：push 到 main/master 分支、PR 提交、手动触发
# 执行内容：代码规范检查 → 单元测试 → 覆盖率报告 → 构建验证
# 安全策略：本工作流仅执行测试和构建验证，永不触发任何发布/部署行为
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 最小权限原则：CI 只需要代码读取权限
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 代码规范检查 + 单元测试 + 覆盖率（单平台，快速反馈）
  # ---------------------------------------------------------------------------
  lint-test-coverage:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      # ---- 检出代码 ----
      - name: Checkout repository
        uses: actions/checkout@v7

      # ---- 安装 uv 包管理器 ----
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      # ---- 安装项目依赖（含开发依赖）----
      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ---- 验证开发依赖已安装 ----
      - name: Verify dev dependencies
        run: |
          uv run ruff --version
          uv run pytest --version

      # ---- 代码格式化检查（Ruff）----
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      # ---- 代码规范检查（Ruff lint）----
      - name: Ruff lint check
        run: uv run ruff check src/ tests/

      # ---- 单元测试 + 覆盖率报告 ----
      # 运行全部的单元测试，生成覆盖率报告（测试使用真实环境，无 mock 跳过）
      - name: Run unit tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=pytexmk --cov-report=term-missing --cov-report=xml -m "not slow and not requires_latex"

      # ---- 上传覆盖率报告到 Codecov（如配置了 token）----
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5.5
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Job 2: 构建 wheel 包验证（单平台，纯 Python 包跨平台通用）
  # ---------------------------------------------------------------------------
  build-wheel:
    name: Build & Verify Wheel
    needs: lint-test-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ---- 构建 wheel 包验证 ----
      # 验证包可以正常构建，产物结构完整
      - name: Build wheel
        run: uv build

      # ---- 验证 wheel 包可安装 ----
      - name: Verify wheel installation
        shell: bash
        run: |
          uv pip install --force-reinstall dist/pytexmk-*.whl
          uv run pytexmk --version
          uv run pytexmk --help

      # ---- 上传构建产物（保留7天供调试）----
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheel
          path: dist/*.whl
          compression-level: 6
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: PyInstaller 可执行文件构建验证（多平台，干跑模式）
  # ---------------------------------------------------------------------------
  build-exe-verify:
    name: Build Executable Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-test-coverage
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ---- PyInstaller 构建（仅验证构建流程，不发布）----
      - name: Build PyInstaller binary (dry-run verification)
        run: uv run python tools/build.py --onedir --no-rename

      # ---- 验证可执行文件存在 ----
      - name: Verify executables exist
        shell: bash
        run: |
          ls -la dist/
          test -d dist/PyTeXMK || (echo "ERROR: PyTeXMK directory not found" && exit 1)
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            test -f dist/PyTeXMK/pytexmk.exe || (echo "ERROR: pytexmk.exe not found inside PyTeXMK/" && exit 1)
          else
            test -f dist/PyTeXMK/pytexmk || (echo "ERROR: pytexmk not found inside PyTeXMK/" && exit 1)
          fi
          echo "✅ Executable build verification passed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: exe-verify-${{ matrix.os }}
          path: dist/PyTeXMK/
          compression-level: 6
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: 安全漏洞扫描
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-test-coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ---- 使用 pip-audit 扫描依赖漏洞 ----
      - name: Scan dependencies for vulnerabilities
        run: |
          uv pip install pip-audit
          uv run pip-audit
        continue-on-error: true
