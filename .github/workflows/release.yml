# =============================================================================
# PyTeXMK Release Workflow
# =============================================================================
# 触发条件：
#   1. 推送 v* 标签（正式发布）
#   2. 手动触发（workflow_dispatch）- 默认 dry-run 模式
#
# 执行内容：
#   - 多平台构建 wheel + PyInstaller 可执行文件
#   - 代码规范检查 + 单元测试
#   - Dry-run 模式（默认）：仅验证构建，不发布
#   - 正式发布模式：推送到 PyPI + 创建 GitHub Release
#
# 安全策略：
#   - 默认 dry_run=true，手动触发时不会真实发布
#   - 正式发布仅在推送 v* 标签时执行
#   - PR 提交、普通分支推送不会触发本工作流
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
    branches-ignore:
      - '**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (build only, NO publishing to PyPI/GitHub Release)'
        type: boolean
        default: true

# 发布需要写入权限，但仅在正式发布时生效
permissions:
  contents: write
  id-token: write

# 强制使用 Node.js 24 以避免 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: 多平台构建与测试
  # ---------------------------------------------------------------------------
  build-packages:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ---- 完整测试链路 ----
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Ruff lint check
        run: uv run ruff check src/ tests/

      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short -m "not slow and not requires_latex"

      # ---- 构建 wheel 和 sdist ----
      - name: Build wheel & sdist
        run: uv build

      # ---- 构建 PyInstaller 可执行文件（onedir + onefile 两种模式）----
      - name: Build PyInstaller binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            uv run python tools/make.py build-exe
            uv run python tools/make.py build-exe-onefile
          else
            uv run python tools/build.py --onedir --no-rename
            uv run python tools/build.py --onefile --no-rename --no-clean
          fi

      # ---- 获取版本号 ----
      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(uv run python tools/make.py version)" >> $GITHUB_OUTPUT

      # ---- 平台特定：重命名产物 ----
      - name: Rename outputs (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          chmod +x pytexmk || true
          if [ -d PyTeXMK ]; then
            mv PyTeXMK "PyTeXMK_v${{ steps.version.outputs.version }}_linux_amd64"
          fi
          if [ -f pytexmk ]; then
            mv pytexmk "PyTeXMK_v${{ steps.version.outputs.version }}_linux_amd64.bin"
          fi
          zip -r "PyTeXMK_v${{ steps.version.outputs.version }}_linux_amd64.zip" "PyTeXMK_v${{ steps.version.outputs.version }}_linux_amd64"

      - name: Rename outputs (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          ARCH=$(uname -m)
          chmod +x pytexmk || true
          if [ -d PyTeXMK ]; then
            mv PyTeXMK "PyTeXMK_v${{ steps.version.outputs.version }}_macos_${ARCH}"
          fi
          if [ -f pytexmk ]; then
            mv pytexmk "PyTeXMK_v${{ steps.version.outputs.version }}_macos_${ARCH}.bin"
          fi
          zip -r "PyTeXMK_v${{ steps.version.outputs.version }}_macos_${ARCH}.zip" "PyTeXMK_v${{ steps.version.outputs.version }}_macos_${ARCH}"

      - name: Rename outputs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          if (Test-Path PyTeXMK) {
            Compress-Archive -Path PyTeXMK -DestinationPath "PyTeXMK_v${{ steps.version.outputs.version }}_win_amd64.zip"
          }

      # ---- 上传构建产物 ----
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.os }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.zip
            dist/PyTeXMK_v*/
            dist/PyTeXMK_v*.*
          compression-level: 6
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: 发布到 PyPI（仅在正式发布时执行）
  # 触发条件：!dry_run AND 是 v* tag 推送
  # 需要在 GitHub Settings 中配置 PyPI trusted publishing
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build-packages
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
    environment:
      name: pypi
      url: https://pypi.org/p/pytexmk

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ---------------------------------------------------------------------------
  # Job 3: 创建 GitHub Release（仅在正式发布时执行）
  # 触发条件：!dry_run AND 是 v* tag 推送
  # ---------------------------------------------------------------------------
  publish-github-release:
    name: Create GitHub Release
    needs: build-packages
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          awk "/^## v$VERSION\$/{flag=1;next} /^## v/{flag=0} flag" CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "See CHANGELOG.md for details." > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PyTeXMK ${{ steps.changelog.outputs.tag }}
          body_path: release_notes.md
          files: release-assets/**/*
          generate_release_notes: true
          draft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Job 4: Dry-run 总结（默认执行）
  # 触发条件：dry_run=true OR 不是 tag 推送
  # 仅列出构建产物，不执行任何发布操作
  # ---------------------------------------------------------------------------
  dry-run-summary:
    name: Dry Run Summary
    needs: build-packages
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run || !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-assets
          merge-multiple: true

      - name: List built artifacts
        run: ls -la test-assets/

      - name: Verify wheel packages
        run: |
          echo "=== Wheel files ==="
          ls -la test-assets/*.whl || echo "No wheel files found"
          echo ""
          echo "=== Zip archives ==="
          ls -la test-assets/*.zip || echo "No zip archives found"
          echo ""
          echo "=== Source distributions ==="
          ls -la test-assets/*.tar.gz || echo "No sdist found"

      - name: Dry run complete
        run: |
          echo "========================================="
          echo "✅ DRY RUN COMPLETED SUCCESSFULLY"
          echo "========================================="
          echo ""
          echo "Artifacts were built and validated but NOT published."
          echo ""
          echo "To publish a real release:"
          echo "  1. Create and push a version tag: git tag vX.Y.Z && git push origin vX.Y.Z"
          echo "  OR"
          echo "  2. Run this workflow manually with dry_run = false"
          echo "========================================="
