name: Feature Request
description: Suggest an idea for PyTeXMK
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        感谢您提出新功能建议！
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? / 功能请求与问题相关吗？
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like / 描述您想要的解决方案
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered / 描述您考虑过的替代方案
      description: Any alternative solutions or features you've considered.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context / 其他上下文
      description: Add any other context or screenshots about the feature request here.
